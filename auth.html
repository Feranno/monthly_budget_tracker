<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Budget — Sign in</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&family=Geist+Mono:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f7f5f0;--surface:#ffffff;--line:#e8e4dc;--text:#1a1814;--mid:#7a756c;--faint:#b0aa9e;--accent:#b84c2a}
body{font-family:'Geist Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:6px;padding:32px;width:100%;max-width:360px}
h1{font-family:'EB Garamond',serif;font-size:1.5rem;font-weight:400;margin-bottom:4px}
.sub{font-size:.7rem;color:var(--faint);margin-bottom:28px;letter-spacing:.04em}
.field-label{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);margin-bottom:5px}
.field{margin-bottom:14px}
input{font-family:'Geist Mono',monospace;font-size:.78rem;background:var(--bg);border:1px solid var(--line);color:var(--text);padding:9px 12px;border-radius:3px;outline:none;width:100%;transition:border-color .15s}
input:focus{border-color:#b0aa9e}
button.primary{font-family:'Geist Mono',monospace;font-size:.72rem;font-weight:500;background:var(--text);color:var(--bg);border:none;padding:10px 0;border-radius:3px;cursor:pointer;width:100%;margin-top:6px;transition:opacity .15s}
button.primary:hover{opacity:.8}
.toggle{font-size:.68rem;color:var(--faint);text-align:center;margin-top:16px}
.toggle a{color:var(--mid);cursor:pointer;text-decoration:underline;text-underline-offset:2px}
.msg{font-size:.7rem;padding:9px 12px;border-radius:3px;margin-bottom:14px;display:none}
.msg.error{background:#fdf3ee;color:var(--accent);border:1px solid #e8c9ba;display:block}
.msg.success{background:#edf5f0;color:#2a6644;border:1px solid #b8d9c8;display:block}
</style>
</head>
<body>
<div class="card">
  <h1>Budget</h1>
  <div class="sub">Monthly planner</div>

  <div class="msg" id="msg"></div>

  <div id="form-signin">
    <div class="field"><div class="field-label">Email</div><input id="si-email" type="email" placeholder="you@example.com"/></div>
    <div class="field"><div class="field-label">Password</div><input id="si-pass" type="password" placeholder="••••••••"/></div>
    <button class="primary" onclick="signIn()">Sign in</button>
    <div class="toggle">No account? <a onclick="showSignup()">Sign up</a></div>
  </div>

  <div id="form-signup" style="display:none">
    <div class="field"><div class="field-label">Email</div><input id="su-email" type="email" placeholder="you@example.com"/></div>
    <div class="field"><div class="field-label">Password</div><input id="su-pass" type="password" placeholder="Min 6 characters"/></div>
    <button class="primary" onclick="signUp()">Create account</button>
    <div class="toggle">Have an account? <a onclick="showSignin()">Sign in</a></div>
  </div>
</div>

<script>
// ── PASTE YOUR SUPABASE VALUES HERE ──────────────────────────────
const SUPABASE_URL  = 'https://octgfduittzmqepkrxy.supabase.co';
const SUPABASE_ANON = 'sb_publishable_Yyfn_nKfWlzL13xn7sqnPA_Jz_ri-9G';
// ─────────────────────────────────────────────────────────────────

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// If already logged in, go straight to app
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = '/';
});

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}

function showSignup() {
  document.getElementById('form-signin').style.display = 'none';
  document.getElementById('form-signup').style.display = 'block';
  document.getElementById('msg').className = 'msg';
}

function showSignin() {
  document.getElementById('form-signup').style.display = 'none';
  document.getElementById('form-signin').style.display = 'block';
  document.getElementById('msg').className = 'msg';
}

async function signIn() {
  const email = document.getElementById('si-email').value.trim();
  const password = document.getElementById('si-pass').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { showMsg(error.message, 'error'); return; }
  window.location.href = '/';
}

async function signUp() {
  const email = document.getElementById('su-email').value.trim();
  const password = document.getElementById('su-pass').value;
  const { error } = await sb.auth.signUp({ email, password });
  if (error) { showMsg(error.message, 'error'); return; }
  showMsg('Account created — check your email to confirm, then sign in.', 'success');
  showSignin();
}
</script>
</body>
</html>
